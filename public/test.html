<!DOCTYPE html>
<html lang="de" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap 6 Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        html, body { height: 100%; display: flex; flex-direction: column; }
        .container { width: 100%; margin: 0 auto; }
        .container-75 { max-width: 75%; margin: 0 auto;}
        .topbar, .footer { width: 100%; }
        .content { flex: 1; }
    </style>
</head>
<body>
    <!-- Topbar -->
    <nav class="navbar navbar-expand-lg bg-body-secondary py-2">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Menü 1</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Option 1</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Menü 2</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Option 2</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Menü 3</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Option 3</a></li>
                        </ul>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Menü 4</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Option 4</a></li>
                        </ul>
                    </li>
                </ul>
                <!-- Dark Mode Toggle & User Avatar -->
                <div class="d-flex align-items-center">
                    <button id="darkModeToggle" class="btn me-3">
                        <i id="darkModeIcon" data-lucide="moon"></i>
                    </button>
                    <div class="dropdown">
                        <button class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown">
                            <img src="https://via.placeholder.com/30" class="rounded-circle" alt="User">
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#">Profil</a></li>
                            <li><a class="dropdown-item" href="#">Logout</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Content -->
    <main class="container py-4 content">
        <div class="container-75">
        <h1>Willkommen</h1>
        <p>Hier ist dein Bootstrap 6 Layout mit Dark Mode und Responsive Navbar.</p>
        </div>
    </main>
    
    <!-- Footer -->
    <footer class="footer bg-body-secondary py-3">
        <div class="container-75 text-start">
            &copy; 2025 Dein Projekt
        </div>
    </footer>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            lucide.createIcons();
            const toggleButton = document.getElementById("darkModeToggle");
            const htmlElement = document.documentElement;
            toggleButton.addEventListener("click", function() {
                const currentTheme = htmlElement.getAttribute("data-bs-theme");
                const newTheme = currentTheme === "light" ? "dark" : "light";
                htmlElement.setAttribute("data-bs-theme", newTheme);
                document.getElementById("darkModeIcon").setAttribute("data-lucide", newTheme === "light" ? "moon" : "sun");
                lucide.createIcons();
            });
        });
    </script>
</body>
</html>
